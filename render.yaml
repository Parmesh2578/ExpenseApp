services:
  - type: web
    name: expenseapp-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: ACCESS_TOKEN_EXPIRES
        value: 15m
      - key: REFRESH_TOKEN_DAYS
        value: 7
      - key: CORS_ORIGIN
        # Set this to your frontend URL after frontend deploy.
        # Example: https://expense-app.vercel.app
        sync: false
